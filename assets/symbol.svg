<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 130" fill="none" role="img" aria-label="Roots and Acre symbol">
  <defs>
    <clipPath id="ra-right"><circle cx="140" cy="65" r="52"></circle></clipPath>
    <pattern id="ra-hatch" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="currentColor" stroke-width="3"></line>
    </pattern>
  </defs>
  <g style="color:#ffd6a0">
    <circle cx="70" cy="65" r="52" stroke="currentColor" stroke-width="3.4"></circle>
    <circle cx="140" cy="65" r="52" stroke="currentColor" stroke-width="3.4"></circle>
    <g clip-path="url(#ra-right)">
      <circle cx="70" cy="65" r="52" fill="url(#ra-hatch)"></circle>
    </g>
  </g>
</svg>
